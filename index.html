<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-KOR OS</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; background: #111; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #222; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #00ffcc; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #00ffcc; color: #000; font-weight: bold; cursor: pointer; }
        #response { margin-top: 20px; font-size: 0.95rem; color: #ccc; line-height: 1.6; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="letter-spacing: 5px;">OMNI-KOR</h2>
        <input type="text" id="userInput" placeholder="សួរអ្វីមួយទៅ OMNI-KOR...">
        <button onclick="askAI()">បញ្ជូនបញ្ជា</button>
        <div id="response">ស្ថានភាព៖ រង់ចាំ...</div>
    </div>

    <script>
async function askAI() {
    const inputField = document.getElementById('userInput');
    const resDiv = document.getElementById('response');
    const input = inputField.value;

    // --- វិធីបំបែក Key ដើម្បីការពារការបិទពី Google ---
    const p1 = "AlzaSyDWr_vKl4nZWR6VZr"; 
    const p2 = "yP9SYvhuqk4F4qHiU";
    const apiKey = p1 + p2; 

    if (!input) return;
    resDiv.innerText = "OMNI-KOR កំពុងគិត...";

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
        });

        const data = await response.json();
        
        if (data.candidates && data.candidates[0].content.parts[0].text) {
            resDiv.innerText = data.candidates[0].content.parts[0].text;
        } else {
            resDiv.innerText = "មានបញ្ហាឆ្លើយតប! សូមសាកល្បងសំណួរផ្សេង។";
        }
    } catch (error) {
        resDiv.innerText = "ការភ្ជាប់មានបញ្ហា! សូមពិនិត្យមើល API Key របស់អ្នកឡើងវិញ។";
    }
}
</script>
</body>
</html>
