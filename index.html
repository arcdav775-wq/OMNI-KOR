<script>
    async function askAI() {
        const inputField = document.getElementById('userInput');
        const resDiv = document.getElementById('response');
        const input = inputField.value;

        // ប្រើ Key ដែលអ្នកបានចម្លងពី Google AI Studio
        const apiKey = "AIzaSyDX44ZEF4G-bmc4cxwqexm5FW1Oh-dp6SA";

        if (!input) return;
        resDiv.innerText = "OMNI-KOR កំពុងគិត...";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
            });

            const data = await response.json();
            resDiv.innerText = data.candidates[0].content.parts[0].text;
        } catch (error) {
            resDiv.innerText = "ការភ្ជាប់មានបញ្ហា! សូមពិនិត្យ API Key របស់អ្នក។";
        }
    }
</script>
