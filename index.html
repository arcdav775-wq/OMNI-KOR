<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-KOR OS</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; background: #111; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #222; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #00ffcc; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #00ffcc; color: #000; font-weight: bold; cursor: pointer; }
        #response { margin-top: 20px; font-size: 0.95rem; color: #ccc; line-height: 1.6; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="letter-spacing: 5px;">OMNI-KOR</h2>
        <input type="text" id="userInput" placeholder="бһҹбһҪбһҡбһўбҹ’бһңбһёбһҳбһҪбһҷбһ‘бҹ… OMNI-KOR...">
        <button onclick="askAI()">бһ”бһүбҹ’бһҮбһјбһ“бһ”бһүбҹ’бһҮбһ¶</button>
        <div id="response">бһҹбҹ’бһҗбһ¶бһ“бһ—бһ¶бһ–бҹ– бһҡбһ„бҹӢбһ…бһ¶бҹҶ...</div>
    </div>

    <script>
        async function askAI() {
            const inputField = document.getElementById('userInput');
            const resDiv = document.getElementById('response');
            const input = inputField.value;
            
            // бһҠбһ¶бһҖбҹӢ API Key бһҗбҹ’бһҳбһёбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһ“бҹ…бһ…бһ“бҹ’бһӣбҹ„бҹҮбһҹбһүбҹ’бһүбһ¶бһҹбһҳбҹ’бһҡбһ„бҹӢбһҒбһ¶бһ„бһҖбҹ’бһҡбҹ„бһҳбһ“бҹҒбҹҮ
            const apiKey = "AIzaSyCHNGrAEsT5xhbmYLQmfjfkIL0fO6_J2gs"; 

            if (!input) return;
            resDiv.innerText = "OMNI-KOR бһҖбҹҶбһ–бһ»бһ„бһӮбһ·бһҸ...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
                });
                const data = await response.json();
                resDiv.innerText = data.candidates[0].content.parts[0].text;
            } catch (error) {
                resDiv.innerText = "бһҖбһ¶бһҡбһ—бҹ’бһҮбһ¶бһ”бҹӢбһҳбһ¶бһ“бһ”бһүбҹ’бһ бһ¶! бһҹбһјбһҳбһ–бһ·бһ“бһ·бһҸбҹ’бһҷ API Key бһҗбҹ’бһҳбһёбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбҹ”";
            }
        }
    </script>
</body>
</html>
